<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chuyển hướng đến ứng dụng Vidimi...</title>
    <link rel="shortcut icon" href="https://cdn.vidimi.vn/theme/V01-build/img/vidimi-icon-small.png">
    <link rel="icon" href="https://cdn.vidimi.vn/theme/V01-build/img/vidimi-icon-192.png" sizes="192x192">
    <link rel="apple-touch-icon" href="https://cdn.vidimi.vn/theme/V01-build/img/vidimi-icon-180.png" sizes="180x180">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --vidimi-purple: #b600c4; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
            background-image: radial-gradient(circle at 50% 50%, rgba(182, 0, 196, 0.05) 0%, transparent 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            color: #333;
            text-align: center;
        }

        .container {
            background: white;
            padding: 2.5rem 1.5rem;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            max-width: 420px;
            width: 100%;
            border: 1px solid rgba(182, 0, 196, 0.08);
            transition: transform 0.3s ease;
        }

        .logo { 
            width: 70px; 
            height: auto; 
            margin-bottom: 24px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .loader {
            border: 3.5px solid #f3f3f3;
            border-top: 3.5px solid var(--vidimi-purple);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        h1 { 
            font-size: 1.35rem; 
            font-weight: 700; 
            margin-bottom: 12px; 
            color: var(--vidimi-purple);
            letter-spacing: -0.5px;
        }

        p { 
            font-size: 0.95rem; 
            color: #6c757d; 
            margin-bottom: 32px; 
            line-height: 1.6;
            padding: 0 10px;
        }

        .download-buttons { 
            display: flex; 
            justify-content: center; 
            gap: 12px; 
            flex-direction: row;
        }

        .btn-download { 
            flex: 1;
            min-width: 140px;
            transition: all 0.2s ease;
        }

        .btn-download img { 
            width: 100%;
            height: auto;
            max-height: 48px;
            object-fit: contain;
            border-radius: 10px;
        }

        @media (max-width: 480px) {
            .container {
                padding: 2rem 1.2rem;
                border-radius: 24px;
            }

            h1 { font-size: 1.25rem; }
            
            .download-buttons {
                flex-direction: column;
                align-items: center;
            }

            .btn-download {
                width: 100%;
                max-width: 200px;
            }
            
            .logo { width: 60px; }
        }

        @media (max-height: 450px) {
            .container { padding: 1.5rem; }
            .logo { margin-bottom: 10px; }
            p { margin-bottom: 15px; }
        }

        .btn-download:hover { transform: translateY(-3px) scale(1.02); }
        .btn-download:active { transform: scale(0.96); }
    </style>
</head>
<body>

<div class="container">
    <img src="https://cdn.vidimi.vn/theme/V01/img/logo-square.png" alt="Vidimi Logo" class="logo">
    <div class="loader"></div>
    <h1>Đang mở Vidimi...</h1>
    <p>Hệ thống đang kiểm tra và đưa bạn đến trải nghiệm tốt nhất.</p>
    
    <div class="download-buttons">
        <a href="https://apps.apple.com/app/id6743361451" class="btn-download">
            <img src="https://cdn.vidimi.vn/theme/V01-build/img/icons/apple-store-download.png" alt="App Store">
        </a>
        <a href="https://play.google.com/store/apps/details?id=vn.vidimi.app.client" class="btn-download">
            <img src="https://cdn.vidimi.vn/theme/V01-build/img/icons/google-play-download.png" alt="Google Play">
        </a>
    </div>
</div>

<script>
    window.onload = function() {
        const userAgent = navigator.userAgent || navigator.vendor || window.opera;
        const config = {
            deepLink: "vidimi://vidimi.vn", 
            iosStore: "https://apps.apple.com/app/id6743361451",
            androidStore: "https://play.google.com/store/apps/details?id=vn.vidimi.app.client"
        };

        const isIOS = /iPad|iPhone|iPod/.test(userAgent) && !window.MSStream;
        const isAndroid = /android/i.test(userAgent);

        if (isIOS || isAndroid) {
            // Thử mở app
            window.location.href = config.deepLink;

            setTimeout(function() {
                if (!document.hidden) {
                    window.location.href = isIOS ? config.iosStore : config.androidStore;
                }
            }, 1800);
        }
    };
</script>

</body>
</html>
